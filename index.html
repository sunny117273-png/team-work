<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Optimizer - 실전 업무 관리 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.25rem; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .input-style { border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.5rem 0.75rem; transition: all 0.2s; font-size: 0.875rem; }
        .input-style:focus { border-color: #6366f1; ring: 2px; outline: none; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; transition: transform 0.1s, opacity 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen py-6 px-4 md:px-8 lg:px-12">

    <div class="max-w-7xl mx-auto">
        <!-- 상단 헤더 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-indigo-600 rounded-2xl shadow-lg">
                    <i class="fas fa-balance-scale text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-800">Team Optimizer</h1>
                    <p class="text-sm text-slate-500 font-medium">실전 데이터 입력 및 업무 최적화 배정 도구</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="resetAllData()" class="px-4 py-2 text-xs font-semibold text-slate-400 hover:text-rose-600 transition flex items-center gap-2">
                    <i class="fas fa-rotate-left"></i> 데이터 초기화
                </button>
                <div id="save-status" class="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold border border-emerald-100">
                    <i class="fas fa-cloud-upload-alt mr-1"></i> 데이터 자동 저장 중
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 왼쪽: 데이터 입력 섹션 -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- 팀원 설정 -->
                <section class="glass-card p-6 border-t-4 border-indigo-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-lg flex items-center gap-2">
                            <i class="fas fa-users text-indigo-500"></i> 팀원 관리
                        </h2>
                        <span id="member-count" class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded">0명</span>
                    </div>
                    <div class="grid grid-cols-5 gap-2 mb-4">
                        <input id="m-name" type="text" placeholder="이름" class="col-span-3 input-style">
                        <input id="m-load" type="number" placeholder="기존%" class="col-span-2 input-style">
                    </div>
                    <button onclick="addMember()" class="w-full btn-primary py-2 rounded-lg font-bold text-sm shadow-md mb-4">
                        <i class="fas fa-plus mr-1"></i> 팀원 등록
                    </button>
                    <div id="member-list" class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                        <!-- 멤버 리스트 동적 생성 -->
                    </div>
                </section>

                <!-- 프로젝트 설정 -->
                <section class="glass-card p-6 border-t-4 border-rose-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-lg flex items-center gap-2">
                            <i class="fas fa-rocket text-rose-500"></i> 신규 프로젝트 배정
                        </h2>
                        <span id="project-count" class="text-xs font-bold bg-rose-100 text-rose-700 px-2 py-1 rounded">0개</span>
                    </div>
                    <div class="grid grid-cols-5 gap-2 mb-4">
                        <input id="p-name" type="text" placeholder="프로젝트명" class="col-span-3 input-style">
                        <input id="p-load" type="number" placeholder="부하%" class="col-span-2 input-style">
                    </div>
                    <button onclick="addProject()" class="w-full bg-rose-500 hover:bg-rose-600 text-white py-2 rounded-lg font-bold text-sm shadow-md mb-4">
                        <i class="fas fa-plus mr-1"></i> 프로젝트 추가
                    </button>
                    <div id="project-list" class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                        <!-- 프로젝트 리스트 동적 생성 -->
                    </div>
                </section>

                <div class="p-4 bg-slate-800 rounded-2xl text-white shadow-xl">
                    <h3 class="font-bold text-sm mb-1 flex items-center gap-2">
                        <i class="fas fa-lightbulb text-yellow-400"></i> 사용 팁
                    </h3>
                    <p class="text-[11px] leading-relaxed opacity-80">
                        팀원들의 현재 업무량(%)과 새로 들어온 프로젝트의 예상 부하(%)를 입력하세요. 알고리즘이 가장 여유로운 팀원에게 일을 자동 배정합니다.
                    </p>
                </div>
            </div>

            <!-- 오른쪽: 분석 및 결과 섹션 -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- 차트 섹션 -->
                <section class="glass-card p-6">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">📊 실시간 로드 밸런싱 분석</h2>
                            <p class="text-sm text-slate-500">배정 전과 배정 후의 예상 부하 변화를 한눈에 확인하세요.</p>
                        </div>
                    </div>
                    
                    <div class="h-80 w-full relative">
                        <canvas id="optimizationChart"></canvas>
                    </div>

                    <div id="insight-box" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- 분석 결과 요약 동적 생성 -->
                    </div>
                </section>

                <!-- 배정 상세 내역 -->
                <section class="glass-card p-6 overflow-hidden">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-clipboard-list text-slate-400"></i> 최종 배정 리포트
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-slate-500">
                            <thead class="text-xs text-slate-700 uppercase bg-slate-50">
                                <tr>
                                    <th class="px-6 py-3 rounded-l-lg">팀원</th>
                                    <th class="px-6 py-3">기본 로드</th>
                                    <th class="px-6 py-3 text-indigo-600 font-bold">최종 로드</th>
                                    <th class="px-6 py-3 rounded-r-lg">배정 프로젝트</th>
                                </tr>
                            </thead>
                            <tbody id="result-table-body">
                                <!-- 테이블 내용 동적 생성 -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // --- 데이터 관리부 ---
        let team = JSON.parse(localStorage.getItem('final_opt_team')) || [];
        let projects = JSON.parse(localStorage.getItem('final_opt_projects')) || [];
        let myChart = null;

        // 초기 시작
        function init() {
            renderTeam();
            renderProjects();
            optimizeDistribution();
        }

        // 로컬 브라우저에 저장
        function saveToLocal() {
            localStorage.setItem('final_opt_team', JSON.stringify(team));
            localStorage.setItem('final_opt_projects', JSON.stringify(projects));
            const statusEl = document.getElementById('save-status');
            statusEl.innerHTML = '<i class="fas fa-check-circle mr-1"></i> 데이터 안전하게 저장됨';
            setTimeout(() => {
                statusEl.innerHTML = '<i class="fas fa-cloud-upload-alt mr-1"></i> 데이터 자동 저장 중';
            }, 3000);
        }

        // --- 팀원 관리 ---
        function addMember() {
            const name = document.getElementById('m-name').value;
            const load = parseInt(document.getElementById('m-load').value);
            if(!name || isNaN(load)) return;
            team.push({ id: Date.now(), name, load });
            document.getElementById('m-name').value = '';
            document.getElementById('m-load').value = '';
            renderTeam();
            saveToLocal();
            optimizeDistribution();
        }

        function deleteMember(id) {
            team = team.filter(m => m.id !== id);
            renderTeam();
            saveToLocal();
            optimizeDistribution();
        }

        function renderTeam() {
            const list = document.getElementById('member-list');
            document.getElementById('member-count').innerText = `${team.length}명`;
            list.innerHTML = team.map(m => `
                <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl">
                    <span class="text-sm font-semibold">${m.name} <span class="text-xs text-slate-400 font-normal">(${m.load}%)</span></span>
                    <button onclick="deleteMember(${m.id})" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        // --- 프로젝트 관리 ---
        function addProject() {
            const name = document.getElementById('p-name').value;
            const load = parseInt(document.getElementById('p-load').value);
            if(!name || isNaN(load)) return;
            projects.push({ id: Date.now(), name, load });
            document.getElementById('p-name').value = '';
            document.getElementById('p-load').value = '';
            renderProjects();
            saveToLocal();
            optimizeDistribution();
        }

        function deleteProject(id) {
            projects = projects.filter(p => p.id !== id);
            renderProjects();
            saveToLocal();
            optimizeDistribution();
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            document.getElementById('project-count').innerText = `${projects.length}개`;
            list.innerHTML = projects.map(p => `
                <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl">
                    <span class="text-sm font-semibold text-slate-600">${p.name} <span class="text-xs text-rose-400 font-normal">(${p.load}%)</span></span>
                    <button onclick="deleteProject(${p.id})" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        function resetAllData() {
            if(confirm('모든 데이터를 초기화하시겠습니까? 입력한 팀원 정보가 삭제됩니다.')) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- 핵심 최적화 엔진 ---
        function optimizeDistribution() {
            if(team.length === 0) {
                if(myChart) myChart.destroy();
                document.getElementById('result-table-body').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-slate-400">팀원 정보를 먼저 입력해 주세요.</td></tr>';
                return;
            }

            let results = team.map(m => ({ ...m, finalLoad: m.load, assignedProjects: [] }));
            const sortedProjects = [...projects].sort((a, b) => b.load - a.load);

            sortedProjects.forEach(p => {
                results.sort((a, b) => a.finalLoad - b.finalLoad);
                results[0].finalLoad += p.load;
                results[0].assignedProjects.push(p.name);
            });

            results.sort((a, b) => a.name.localeCompare(b.name));
            updateUI(results);
        }

        function updateUI(results) {
            // 차트 업데이트
            const ctx = document.getElementById('optimizationChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: results.map(r => r.name),
                    datasets: [
                        { label: '기존 로드', data: results.map(r => r.load), backgroundColor: '#e2e8f0', borderRadius: 8 },
                        { label: '최종 로드', data: results.map(r => r.finalLoad), backgroundColor: '#6366f1', borderRadius: 8 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });

            // 인사이트 카드
            const avg = results.reduce((a, b) => a + b.finalLoad, 0) / results.length;
            const max = Math.max(...results.map(r => r.finalLoad));
            const dev = max - Math.min(...results.map(r => r.finalLoad));

            document.getElementById('insight-box').innerHTML = `
                <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                    <p class="text-xs text-indigo-500 font-bold mb-1">평균 업무 부하</p>
                    <p class="text-2xl font-black text-indigo-700">${avg.toFixed(1)}%</p>
                </div>
                <div class="p-4 bg-rose-50 rounded-xl border border-rose-100">
                    <p class="text-xs text-rose-500 font-bold mb-1">최대 부하 팀원</p>
                    <p class="text-2xl font-black text-rose-700">${max}%</p>
                </div>
                <div class="p-4 bg-slate-100 rounded-xl border border-slate-200">
                    <p class="text-xs text-slate-500 font-bold mb-1">업무 균등 수준</p>
                    <p class="text-lg font-black text-slate-700">${dev <= 20 ? '최적 ✨' : '조정 필요 ⚖️'}</p>
                </div>
            `;

            // 테이블 업데이트
            document.getElementById('result-table-body').innerHTML = results.map(r => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="px-6 py-4 font-bold text-slate-800">${r.name}</td>
                    <td class="px-6 py-4 text-slate-400">${r.load}%</td>
                    <td class="px-6 py-4 font-black text-indigo-600">${r.finalLoad}%</td>
                    <td class="px-6 py-4">
                        ${r.assignedProjects.length > 0 
                            ? r.assignedProjects.map(p => `<span class="inline-block bg-indigo-100 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full mr-1 mb-1">${p}</span>`).join('')
                            : '<span class="text-slate-300 text-xs">배정 없음</span>'}
                    </td>
                </tr>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
